services:
  - type: web
    name: tournament-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tournament-db
          property: connectionString

databases:
  - name: tournament-db
    plan: free
